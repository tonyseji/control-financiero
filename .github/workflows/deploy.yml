name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug env lengths
        run: |
          echo "URL length: ${#VITE_SUPABASE_URL}"
          echo "KEY length: ${#VITE_SUPABASE_ANON_KEY}"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Node.js (V1)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: control-financiero-app/package-lock.json

      - name: Instalar dependencias V1
        working-directory: control-financiero-app
        run: npm ci

      - name: Build V1
        working-directory: control-financiero-app
        run: npm run build

      - name: Setup Node.js (V2)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: finanzas-v2/app/package-lock.json

      - name: Instalar dependencias V2
        working-directory: finanzas-v2/app
        run: npm ci

      - name: Build V2
        working-directory: finanzas-v2/app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Merge V2 into dist/v2
        run: |
          mkdir -p control-financiero-app/dist/v2
          cp -r finanzas-v2/app/dist/. control-financiero-app/dist/v2/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: control-financiero-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
